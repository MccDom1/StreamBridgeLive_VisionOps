<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreamBridge VisionOps Dashboard</title>

    <style>
        :root {
            --bg: #07101f;
            --panel: #0f172a;
            --border: #1e293b;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --good: #22c55e;
            --warn: #f59e0b;
            --bad: #ef4444;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Segoe UI,Roboto,Arial,sans-serif;
            background: radial-gradient(900px 400px at 15% 0%, rgba(56,189,248,.18), transparent 60%), radial-gradient(700px 350px at 85% 15%, rgba(34,197,94,.10), transparent 60%), var(--bg);
            color: var(--text);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(2,6,23,.75);
            backdrop-filter: blur(10px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(56,189,248,.20), rgba(34,197,94,.10));
            color: var(--accent);
            font-weight: 800;
        }

        .btn {
            text-decoration: none;
            color: var(--text);
            border: 1px solid var(--border);
            background: rgba(15,23,42,.55);
            padding: 10px 14px;
            border-radius: 12px;
        }

        .wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .metric {
            background: rgba(2,6,23,.30);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
        }

            .metric .label {
                font-size: 12px;
                color: var(--muted);
            }

            .metric .value {
                font-size: 28px;
                font-weight: 800;
                margin-top: 6px;
            }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: var(--bad);
        }

            .dot.ok {
                background: var(--good);
            }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr .9fr .7fr;
            gap: 18px;
        }

        .panel {
            background: linear-gradient(180deg, rgba(15,23,42,.94), rgba(2,6,23,.45));
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px;
        }

            .panel h2 {
                margin: 0 0 10px;
                font-size: 13px;
                color: var(--muted);
            }

        .visual {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

            .visual img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

        .overlay {
            position: absolute;
            inset: 0;
        }

        .bbox {
            position: absolute;
            border: 2px solid var(--accent);
        }

        .chart {
            height: 200px;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        .item {
            background: rgba(2,6,23,.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <header>
        <div class="brand">
            <div class="logo">SB</div>
            <div>
                <div style="font-weight:800;">StreamBridge VisionOps</div>
                <div style="font-size:12px;color:var(--muted);">AI Telemetry Dashboard</div>
            </div>
        </div>
        <div class="status">
            <div id="dot" class="dot"></div>
            <div id="conn">Connecting...</div>
        </div>
    </header>

    <div class="wrap">

        <div class="metrics">
            <div class="metric"><div class="label">FPS</div><div id="fps" class="value">--</div></div>
            <div class="metric"><div class="label">Latency</div><div id="latency" class="value">--</div></div>
            <div class="metric"><div class="label">Dropped</div><div id="dropped" class="value">--</div></div>
            <div class="metric"><div class="label">Detections</div><div id="active" class="value">--</div></div>
        </div>

        <div class="grid">

            <div class="panel">
                <h2>Vision Feed</h2>
                <div class="visual">
                    <img id="scene" />
                    <div id="overlay" class="overlay"></div>
                </div>
            </div>

            <div class="panel">
                <h2>Telemetry</h2>
                <canvas id="chart"></canvas>
                <div id="telemetry" class="item">Waiting...</div>
            </div>

            <div class="panel">
                <h2>Alerts</h2>
                <div id="alerts"></div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>

    <script>
        const conn = document.getElementById("conn");
        const dot = document.getElementById("dot");

        const fps = document.getElementById("fps");
        const latency = document.getElementById("latency");
        const dropped = document.getElementById("dropped");
        const active = document.getElementById("active");

        const scene = document.getElementById("scene");
        const overlay = document.getElementById("overlay");
        const alerts = document.getElementById("alerts");
        const telemetry = document.getElementById("telemetry");

        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/streamhub")
            .withAutomaticReconnect()
            .build();

        connection.on("Frame", f => {
            scene.src = f.imageUrl;
            active.textContent = f.detections.length;

            overlay.innerHTML = "";
            f.detections.forEach(d => {
                const box = document.createElement("div");
                box.className = "bbox";
                box.style.left = d.x + "%";
                box.style.top = d.y + "%";
                box.style.width = d.width + "%";
                box.style.height = d.height + "%";
                overlay.appendChild(box);
            });
        });

        connection.on("Telemetry", t => {
            fps.textContent = t.fps;
            latency.textContent = t.latencyMs;
            dropped.textContent = t.droppedFrames;
            telemetry.textContent = JSON.stringify(t);
        });

        connection.on("Alerts", a => {
            alerts.innerHTML = "";
            a.forEach(x => {
                const div = document.createElement("div");
                div.className = "item";
                div.textContent = x.message;
                alerts.appendChild(div);
            });
        });

        connection.start()
            .then(() => {
                conn.textContent = "Connected";
                dot.classList.add("ok");
            })
            .catch(() => {
                conn.textContent = "Failed to connect";
            });
    </script>

</body>
</html>
